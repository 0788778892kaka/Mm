<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Site</title>

  <style>
    body{
      margin:0;
      padding:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      text-align:center;
    }

    .box{
      background:#1e293b;
      padding:40px;
      border-radius:20px;
      width:300px;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    h1{
      color:#38bdf8;
      margin-bottom:10px;
    }

    p{
      color:#cbd5e1;
    }

    button{
      margin-top:20px;
      padding:12px 25px;
      border:none;
      border-radius:10px;
      background:#38bdf8;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#0ea5e9;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Welcome</h1>

    <p>My first GitHub Pages website 🚀</p>

    <button onclick="showMsg()">
      Click Me
    </button>
  </div>

  <script>
    function showMsg(){
      alert("Hello From GitHub Pages 😎");
    }
  </script>

</body>
</html>
